name: YouTubeMusicSource
type: service
description: "Concrete yt-dlp-backed source for YouTube and YouTube Music search, URL inspection, and cached playback"
relations:
  - target: internal/ui
    type: implements
    consumes: [SearchService]
    failure: "Surface yt-dlp search, auth, or metadata failures through the UI search contract without embedding provider logic in the UI"
  - target: internal/audio
    type: implements
    consumes: [Resolver]
    failure: "Surface download, authentication, or decode failures through the audio resolver contract"
  - target: internal/config
    type: uses
    consumes: [Config]
    failure: "Treat config as typed startup input rather than parsing TOML inside the source"
  - target: pkg/coverart/core
    type: uses
    consumes: [Metadata]
    failure: "Carry remote metadata forward for downstream artwork resolution instead of resolving artwork inside the source"
mapping:
  paths:
    - internal/sources/youtube/
