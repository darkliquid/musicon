name: TerminalUI
type: module
description: "Bubble Tea application shell, screen models, and UI-facing contracts for queue and playback modes"
aspects:
  - aspect: ui/square-viewport
    anchors:
      - SquareViewport
      - ClampSquare
  - aspect: ui/mode-toggle
    anchors:
      - ModeQueue
      - ModePlayback
mapping:
  paths:
    - internal/ui/
relations:
  - target: pkg/components
    type: uses
    consumes: [View, Update, SetSize, SetFocused]
    failure: "Fallback to component empty states or no-op rendering rather than embedding component internals here"
  - target: pkg/coverart/core
    type: uses
    consumes: [Metadata, Normalize]
    failure: "Treat missing or sparse cover-art metadata as a normal fallback condition instead of pushing provider-chain logic into the playback screen"
  - target: pkg/lyrics
    type: uses
    consumes: [Request, Document, Normalize, DisplayLines]
    failure: "Treat missing lyrics metadata or unresolved lyric lookups as normal empty-state conditions instead of blocking the playback UI"
