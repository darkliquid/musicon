name: CLIEntrypoint
type: infrastructure
description: "Thin terminal entrypoint that initializes and runs the Bubble Tea UI application"
aspects:
  - aspect: ui/mode-toggle
    anchors:
      - main
mapping:
  paths:
    - main.go
relations:
  - target: internal/config
    type: calls
    consumes: [LoadDefault, ResolvedLocalDirs]
    failure: "Surface invalid or unreadable config files explicitly before constructing runtime services"
  - target: internal/ui
    type: calls
    consumes: [NewApp, Run]
    failure: "Return startup or runtime errors to the terminal user instead of hiding them"
  - target: internal/audio
    type: calls
    consumes: [ListUsableBackends, NewEngine, QueueService, PlaybackService, Close]
    failure: "Surface audio runtime startup and shutdown failures instead of hiding them behind the terminal UI"
  - target: internal/mpris
    type: calls
    consumes: [NewBridge, Start, Close]
    failure: "Log or surface MPRIS bridge startup failures without breaking terminal playback"
  - target: internal/sources/local
    type: calls
    consumes: [NewLibrary]
    failure: "Degrade cleanly when configured local source directories are unavailable while preserving the terminal UI"
  - target: pkg/coverart/core
    type: calls
    consumes: [NewDiskCache, NewCachedProvider, NewChain]
    failure: "Treat optional artwork-provider startup issues as degradable runtime wiring while preserving the terminal player"
  - target: pkg/components
    type: calls
    consumes: [CanonicalImageRenderer, ListUsableImageRenderers]
    failure: "Keep CLI image-renderer listing aligned with the same canonical labels and capability detection used by the reusable terminal-image component"
  - target: pkg/coverart/providers/local
    type: calls
    consumes: [NewLocalFilesProvider, EmbeddedProvider]
    failure: "Treat optional artwork-provider startup issues as degradable runtime wiring while preserving the terminal player"
  - target: pkg/coverart/providers/remote
    type: calls
    consumes: [NewMusicBrainzProvider, SpotifyProvider, AppleMusicProvider, LastFMProvider]
    failure: "Treat optional artwork-provider startup issues as degradable runtime wiring while preserving the terminal player"
