[audio]
backend = "auto"

[ui]
start_mode = "queue"
cell_width_ratio = 0.5

[ui.theme]
file = ""
background = "235"
surface = "236"
surface_variant = "238"
primary = "63"
on_primary = "230"
text = "252"
text_muted = "246"
text_subtle = "244"
border = "240"
warning = "52"
on_warning = "230"

[ui.album_art]
fill_mode = "fill"
backend = "halfblocks"
protocol = "halfblocks"

[keybinds.global]
quit = ["ctrl+c"]
toggle_mode = ["tab"]
toggle_help = ["?"]

[keybinds.queue]
toggle_search_focus = ["ctrl+f"]
source_prev = ["["]
source_next = ["]"]
cycle_search_mode = ["m"]
mode_songs = ["1"]
mode_artists = ["2"]
mode_albums = ["3"]
mode_playlists = ["4"]
expand_selected = ["e"]
activate_selected = ["enter"]
move_selected_up = ["ctrl+k"]
move_selected_down = ["ctrl+j"]
clear_queue = ["ctrl+x"]
remove_selected = ["x"]
browser_up = ["up", "k"]
browser_down = ["down", "j"]
browser_home = ["home"]
browser_end = ["end"]
browser_page_up = ["pgup"]
browser_page_down = ["pgdown"]

[keybinds.playback]
cycle_pane = ["v"]
toggle_info = ["i"]
toggle_repeat = ["r"]
toggle_stream = ["s"]
toggle_pause = ["space"]
previous_track = ["["]
next_track = ["]"]
seek_backward = ["left"]
seek_forward = ["right"]
volume_down = ["-"]
volume_up = ["=", "+"]

[sources.local]
dirs = ["~/Music"]

[sources.youtube]
enabled = true
max_results = 20
cookies_file = ""
cookies_from_browser = ""
extra_args = []
cache_dir = "~/.cache/musicon/youtube"

[sources.radio]
enabled = true
max_results = 20
base_url = "https://all.api.radio-browser.info"
